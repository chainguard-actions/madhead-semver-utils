name: Test semver comparison
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: semver
        uses: .
        with:
          version: "2.0.0"
          compare-to: "1.0.0"
      - name: Assert comparison-result output (2.0.0 > 1.0.0)
        env:
          ACTUAL: ${{ steps.semver.outputs.comparison-result }}
        run: |
          echo "actual comparison-result: $ACTUAL"
          if [ "$ACTUAL" != ">" ]; then
            echo "FAIL: expected comparison-result to be '>', got '$ACTUAL'"
            exit 1
          fi
          echo "PASS"
