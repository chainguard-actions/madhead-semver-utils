name: Test basic semver parsing
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: semver
        uses: .
        with:
          version: "1.2.3"
      - name: Assert major output
        env:
          ACTUAL: ${{ steps.semver.outputs.major }}
        run: |
          echo "actual major: $ACTUAL"
          if [ "$ACTUAL" != "1" ]; then
            echo "FAIL: expected major to be '1', got '$ACTUAL'"
            exit 1
          fi
          echo "PASS"
      - name: Assert minor output
        env:
          ACTUAL: ${{ steps.semver.outputs.minor }}
        run: |
          echo "actual minor: $ACTUAL"
          if [ "$ACTUAL" != "2" ]; then
            echo "FAIL: expected minor to be '2', got '$ACTUAL'"
            exit 1
          fi
          echo "PASS"
      - name: Assert patch output
        env:
          ACTUAL: ${{ steps.semver.outputs.patch }}
        run: |
          echo "actual patch: $ACTUAL"
          if [ "$ACTUAL" != "3" ]; then
            echo "FAIL: expected patch to be '3', got '$ACTUAL'"
            exit 1
          fi
          echo "PASS"
      - name: Assert release output
        env:
          ACTUAL: ${{ steps.semver.outputs.release }}
        run: |
          echo "actual release: $ACTUAL"
          if [ "$ACTUAL" != "1.2.3" ]; then
            echo "FAIL: expected release to be '1.2.3', got '$ACTUAL'"
            exit 1
          fi
          echo "PASS"
