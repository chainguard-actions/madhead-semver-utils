name: Test basic version parsing
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: semver
        uses: .
        with:
          version: "1.2.3-alpha.1+build.42"
      - name: Assert release
        env:
          ACTUAL: ${{ steps.semver.outputs.release }}
        run: |
          echo "actual release: $ACTUAL"
          if [ "$ACTUAL" != "1.2.3" ]; then
            echo "FAIL: expected release '1.2.3', got '$ACTUAL'"
            exit 1
          fi
          echo "PASS"
      - name: Assert major
        env:
          ACTUAL: ${{ steps.semver.outputs.major }}
        run: |
          echo "actual major: $ACTUAL"
          if [ "$ACTUAL" != "1" ]; then
            echo "FAIL: expected major '1', got '$ACTUAL'"
            exit 1
          fi
          echo "PASS"
      - name: Assert minor
        env:
          ACTUAL: ${{ steps.semver.outputs.minor }}
        run: |
          echo "actual minor: $ACTUAL"
          if [ "$ACTUAL" != "2" ]; then
            echo "FAIL: expected minor '2', got '$ACTUAL'"
            exit 1
          fi
          echo "PASS"
      - name: Assert patch
        env:
          ACTUAL: ${{ steps.semver.outputs.patch }}
        run: |
          echo "actual patch: $ACTUAL"
          if [ "$ACTUAL" != "3" ]; then
            echo "FAIL: expected patch '3', got '$ACTUAL'"
            exit 1
          fi
          echo "PASS"
      - name: Assert prerelease
        env:
          ACTUAL: ${{ steps.semver.outputs.prerelease }}
        run: |
          echo "actual prerelease: $ACTUAL"
          if [ "$ACTUAL" != "alpha.1" ]; then
            echo "FAIL: expected prerelease 'alpha.1', got '$ACTUAL'"
            exit 1
          fi
          echo "PASS"
      - name: Assert build
        env:
          ACTUAL: ${{ steps.semver.outputs.build }}
        run: |
          echo "actual build: $ACTUAL"
          if [ "$ACTUAL" != "build.42" ]; then
            echo "FAIL: expected build 'build.42', got '$ACTUAL'"
            exit 1
          fi
          echo "PASS"
      - name: Assert inc-major
        env:
          ACTUAL: ${{ steps.semver.outputs.inc-major }}
        run: |
          echo "actual inc-major: $ACTUAL"
          if [ "$ACTUAL" != "2.0.0" ]; then
            echo "FAIL: expected inc-major '2.0.0', got '$ACTUAL'"
            exit 1
          fi
          echo "PASS"
      - name: Assert inc-minor
        env:
          ACTUAL: ${{ steps.semver.outputs.inc-minor }}
        run: |
          echo "actual inc-minor: $ACTUAL"
          if [ "$ACTUAL" != "1.3.0" ]; then
            echo "FAIL: expected inc-minor '1.3.0', got '$ACTUAL'"
            exit 1
          fi
          echo "PASS"
      - name: Assert inc-patch
        env:
          ACTUAL: ${{ steps.semver.outputs.inc-patch }}
        run: |
          echo "actual inc-patch: $ACTUAL"
          if [ "$ACTUAL" != "1.2.4" ]; then
            echo "FAIL: expected inc-patch '1.2.4', got '$ACTUAL'"
            exit 1
          fi
          echo "PASS"
