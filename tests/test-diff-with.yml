name: Test diff-with input
on:
  workflow_dispatch:
jobs:
  test-major-diff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: semver
        uses: .
        with:
          version: "2.0.0"
          diff-with: "1.0.0"
      - name: Assert diff-result is major
        env:
          ACTUAL: ${{ steps.semver.outputs.diff-result }}
        run: |
          echo "actual diff-result: $ACTUAL"
          if [ "$ACTUAL" != "major" ]; then
            echo "FAIL: expected diff-result 'major', got '$ACTUAL'"
            exit 1
          fi
          echo "PASS"

  test-minor-diff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: semver
        uses: .
        with:
          version: "1.1.0"
          diff-with: "1.0.0"
      - name: Assert diff-result is minor
        env:
          ACTUAL: ${{ steps.semver.outputs.diff-result }}
        run: |
          echo "actual diff-result: $ACTUAL"
          if [ "$ACTUAL" != "minor" ]; then
            echo "FAIL: expected diff-result 'minor', got '$ACTUAL'"
            exit 1
          fi
          echo "PASS"

  test-patch-diff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: semver
        uses: .
        with:
          version: "1.0.1"
          diff-with: "1.0.0"
      - name: Assert diff-result is patch
        env:
          ACTUAL: ${{ steps.semver.outputs.diff-result }}
        run: |
          echo "actual diff-result: $ACTUAL"
          if [ "$ACTUAL" != "patch" ]; then
            echo "FAIL: expected diff-result 'patch', got '$ACTUAL'"
            exit 1
          fi
          echo "PASS"
