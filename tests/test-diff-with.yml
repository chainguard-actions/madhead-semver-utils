name: Test semver diff-with
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: semver
        uses: .
        with:
          version: "2.0.0"
          diff-with: "1.0.0"
      - name: Assert diff-result output (major diff between 2.0.0 and 1.0.0)
        env:
          ACTUAL: ${{ steps.semver.outputs.diff-result }}
        run: |
          echo "actual diff-result: $ACTUAL"
          if [ "$ACTUAL" != "major" ]; then
            echo "FAIL: expected diff-result to be 'major', got '$ACTUAL'"
            exit 1
          fi
          echo "PASS"
