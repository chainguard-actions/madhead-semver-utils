name: Test semver satisfies range
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: semver-satisfies-true
        uses: .
        with:
          version: "1.2.3"
          satisfies: ">=1.0.0 <2.0.0"
      - name: Assert satisfies is true
        env:
          ACTUAL: ${{ steps.semver-satisfies-true.outputs.satisfies }}
        run: |
          echo "actual satisfies: $ACTUAL"
          if [ "$ACTUAL" != "true" ]; then
            echo "FAIL: expected satisfies to be 'true', got '$ACTUAL'"
            exit 1
          fi
          echo "PASS"
      - id: semver-satisfies-false
        uses: .
        with:
          version: "2.0.0"
          satisfies: ">=1.0.0 <2.0.0"
      - name: Assert satisfies is false
        env:
          ACTUAL: ${{ steps.semver-satisfies-false.outputs.satisfies }}
        run: |
          echo "actual satisfies: $ACTUAL"
          if [ "$ACTUAL" != "false" ]; then
            echo "FAIL: expected satisfies to be 'false', got '$ACTUAL'"
            exit 1
          fi
          echo "PASS"
